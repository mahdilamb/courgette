[project]
name = "courgette-ui"
version = "0.1.0"
description = "Web UI for creating and testing Courgette BDD features"
readme = "README.md"
authors = [{ name = "Mahdi Lamb", email = "mahdilamb@gmail.com" }]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]

[project.scripts]
courgette-ui = "courgette_ui:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv-build]
# Include the React build output in the package
include = ["src/courgette_ui/static/dist/**"]

