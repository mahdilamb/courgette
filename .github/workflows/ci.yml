name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra color --extra dev --extra ui

      - name: Lint
        run: uv run ruff check src/

      - name: Run tests (without behave)
        run: uv run pytest tests/ -v --tb=short

      - name: Run feature tests via CLI
        run: uv run courgette run tests/features/

      - name: Install behave
        run: uv pip install behave

      - name: Run behave compat tests (with behave)
        run: uv run pytest tests/test_behave_compat.py -v --tb=short

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra dev --extra ui

      - name: Build React UI
        run: cd ui && npm ci && npm run build

      - name: Install Playwright
        run: uv run playwright install --with-deps chromium

      - name: Run e2e tests
        run: uv run pytest ui/tests/ -v --browser chromium

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-courgette
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p ./ --noEmit

      - name: Run tests
        run: npx vitest run
