name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra color --extra dev --extra ui

      - name: Lint
        run: uv run ruff check src/

      - name: Run tests (without behave)
        run: uv run pytest tests/ -v --tb=short

      - name: Run feature tests via CLI
        run: uv run courgette run tests/features/

      - name: Install behave
        run: uv pip install behave

      - name: Run behave compat tests (with behave)
        run: uv run pytest tests/test_behave_compat.py -v --tb=short

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra dev --extra ui

      - name: Install npm dependencies
        run: cd ui && npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(cd ui && npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd ui && npx playwright install chromium

      - name: Install Playwright system dependencies
        run: cd ui && npx playwright install-deps chromium

      - name: Build React UI
        run: cd ui && npm run build

      - name: Run Playwright e2e tests
        run: cd ui && npx playwright test --reporter=line

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-courgette
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p ./ --noEmit

      - name: Run tests
        run: npx vitest run
